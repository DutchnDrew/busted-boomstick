<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#121214"/>
    </linearGradient>
    <filter id="grain"><feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="t"/><feColorMatrix type="saturate" values="0" in="t" result="g"/><feBlend in="SourceGraphic" in2="g" mode="overlay"/></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- distant city / explosion motif -->
  <g transform="translate(850,220) scale(1)">
    <circle r="60" fill="#e85d04" opacity="0.95"/>
    <g fill="#2b2b2b" transform="translate(-40,40)">
      <rect x="0" y="0" width="80" height="70" rx="6"/>
      <rect x="90" y="-10" width="30" height="90" rx="3"/>
    </g>
  </g>

  <!-- easel and painter silhouette -->
  <g transform="translate(200,220) scale(1.6)">
    <g id="easel" fill="#1a1a1e">
      <rect x="-40" y="-10" width="120" height="10" rx="3"/>
      <rect x="-10" y="-80" width="80" height="80" rx="4"/>
      <rect x="-60" y="60" width="12" height="120" transform="rotate(-10)"/>
      <rect x="90" y="60" width="12" height="120" transform="rotate(10)"/>
    </g>
    <g id="painter" transform="translate(40,20)">
      <circle r="18" fill="#0a0a0b" stroke="#e85d04" stroke-width="2"/>
      <rect x="-10" y="20" width="20" height="40" fill="#0a0a0b"/>
      <rect x="10" y="30" width="6" height="34" fill="#0a0a0b" transform="rotate(20)"/>
      <rect x="-20" y="30" width="6" height="34" fill="#0a0a0b" transform="rotate(-20)"/>
    </g>

    <!-- canvas with small explosive image hinted -->
    <g transform="translate(10,-60)">
      <rect x="0" y="0" width="60" height="48" fill="#0f0f10" stroke="#2b2b2b" rx="4"/>
      <circle cx="40" cy="18" r="10" fill="#e85d04" opacity="0.9"/>
      <path d="M10 36 C18 30, 28 28, 34 32" stroke="#a0a0a0" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- subtle vignette -->
  <rect width="100%" height="100%" fill="black" opacity="0.25"/>
</svg>